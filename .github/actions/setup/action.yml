name: Environment setup
description: Sets up Node and pnpm

runs:
  using: 'composite'

  steps:
    - name: Install PNPM
      uses: pnpm/action-setup@v6

    - name: Setup Node
      uses: actions/setup-node@v6
      with: { node-version-file: .nvmrc, cache: pnpm }

    - name: Install dependencies
      shell: bash
      run: pnpm install
